name: 自动聚合节点并同步

on:
  push:
    branches: [ "main" ] 
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时在云端自动运行一次

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予机器人写回代码库的权限

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 部署 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装 requests 依赖包
      run: |
        pip install requests

    - name: 运行节点抓取与聚合脚本
      run: |
        python node_aggregator/merge_sub.py

    - name: 将最新生成的订阅文件提交回仓库
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions自动更新"
        git add node_aggregator/my_custom_sub.txt
        # 检查是否有新节点更新，有更新才会提交，避免空提交报错
        git diff --cached --quiet || (git commit -m "全自动更新节点池 [$(date '+%Y-%m-%d %H:%M:%S')]" && git push)
