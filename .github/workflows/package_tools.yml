name: 自动打包本地工具并发布

on:
  push:
    branches: [ "main" ]
    paths:
      - 'youtube_live/local/**' # 🎯 核心：只有当这个文件夹内部的文件有变动时，才触发此流水线

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予创建 Release 和删除旧版本的权限

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 自动打包本地工具文件夹
        run: |
          zip -r 直播工具包.zip youtube_live/local

      - name: 自动创建 GitHub Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: 直播工具包.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 自动清理旧版本 (仅保留最新的 5 个)
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 5 # 🎯 调整为保留最近 5 个版本
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}